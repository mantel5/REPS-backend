name: Build and Deploy Backend to Kubernetes

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: danic19/reps-backend

jobs:
  build-and-push:
    name: Build and Push Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy MySQL
        run: |
          kubectl apply -f k8s-mysql.yaml
          echo "Waiting for MySQL to be ready..."
          kubectl wait --for=condition=available --timeout=120s deployment/mysql-deployment

      - name: Deploy Backend
        run: |
          kubectl apply -f k8s-backend.yaml
          echo "Waiting for Backend to be ready..."
          kubectl wait --for=condition=available --timeout=180s deployment/reps-backend-deployment

      - name: Verify Backend
        run: |
          echo "=== Backend Pods ==="
          kubectl get pods -l app=reps-backend
          echo ""
          echo "=== Backend Logs ==="
          kubectl logs -l app=reps-backend --tail=20

