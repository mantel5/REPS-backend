# Manifiesto para el backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reps-backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reps-backend
  template:
    metadata:
      labels:
        app: reps-backend
    spec:
      containers:
      - name: reps-backend
        image: <danic19>/reps-backend:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: reps-backend-service
spec:
  type: ClusterIP
  selector:
    app: reps-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
