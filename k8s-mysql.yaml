# Manifiesto para MySQL - Versión ultra-ligera
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mariadb:10.11
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "Daniel123"
        - name: MYSQL_DATABASE
          value: "reps_db"
        ports:
        - containerPort: 3306
        # Sin límites para que pueda iniciar
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306

